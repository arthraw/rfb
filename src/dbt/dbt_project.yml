name: "rfb"

profile: dbt
test-paths: ["tests"]
seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  dbt:
    +schema: raw

models:
  dbt:
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
      +schema: trusted
    intermediate:
      +materialized: ephemeral
      +schema: trusted
    marts:
      +materialized: table
      +schema: refined